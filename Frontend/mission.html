<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAR Live Mission View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: rgba(109, 133, 153, 0.93);
            --border: rgba(109, 133, 153, 0.93);
            --accent: #b3ca30;
            --green: #19a725;
            --yellow: #d3bf0d;
            --red: #b60909;
            --purple: #801ddd;
            --text: #0a3005;
            --muted: #350000;
        }

        body {
            background: var(--bg);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        #map {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* --- TOP BAR --- */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            z-index: 1000;
            backdrop-filter: blur(8px);
            font-family: 'Share Tech Mono', monospace;
        }

        #topbar h1 {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .top-sep {
            flex: 1;
        }

        .top-btn {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .06);
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            transition: .2s;
        }

        .top-btn:hover {
            background: rgba(255, 255, 255, .12);
        }

        /* Speed buttons */
        .speed-btn {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .06);
            color: var(--muted);
            cursor: pointer;
            transition: .2s;
        }

        .speed-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .12);
        }

        .speed-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        #speed-label {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        /* Status pill */
        #status-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: rgba(255, 255, 255, .05);
            transition: .3s;
            white-space: nowrap;
        }

        #status-pill.safe {
            border-color: var(--green);
            color: var(--green);
        }

        #status-pill.warn {
            border-color: var(--yellow);
            color: var(--yellow);
        }

        #status-pill.danger {
            border-color: var(--red);
            color: var(--red);
        }

        #status-pill.success {
            border-color: var(--green);
            color: var(--green);
        }

        #status-pill.partial {
            border-color: var(--yellow);
            color: var(--yellow);
        }

        /* --- MISSION CONTROL PANEL --- */
        #mission-ctrl {
            position: fixed;
            top: 56px;
            left: 14px;
            z-index: 1000;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(8px);
            font-family: 'Share Tech Mono', monospace;
        }

        #mission-ctrl .ctrl-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .ctrl-row {
            display: flex;
            gap: 6px;
        }

        .mc-btn {
            flex: 1;
            font-size: 11px;
            font-weight: 700;
            padding: 7px 8px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .07);
            color: var(--text);
            cursor: pointer;
            transition: .2s;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .mc-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, .14);
        }

        .mc-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        .mc-btn.btn-start {
            border-color: var(--green);
            color: var(--green);
        }

        .mc-btn.btn-start:hover:not(:disabled) {
            background: rgba(34, 197, 94, .15);
        }

        .mc-btn.btn-pause {
            border-color: var(--yellow);
            color: var(--yellow);
        }

        .mc-btn.btn-pause:hover:not(:disabled) {
            background: rgba(245, 158, 11, .15);
        }

        .mc-btn.btn-stop {
            border-color: var(--red);
            color: var(--red);
        }

        .mc-btn.btn-stop:hover:not(:disabled) {
            background: rgba(239, 68, 68, .15);
        }

        .mc-btn.btn-restart {
            border-color: var(--accent);
            color: var(--accent);
        }

        .mc-btn.btn-restart:hover:not(:disabled) {
            background: rgba(61, 120, 255, .15);
        }

        /* --- BOTTOM HUD --- */
        #hud {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hud-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 14px;
            backdrop-filter: blur(8px);
            min-width: 80px;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
        }

        .hud-label {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 3px;
            font-family: 'Orbitron', sans-serif;
        }

        .hud-value {
            font-size: 22px;
            font-weight: 900;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
        }

        .hud-value.c-accent {
            color: var(--accent);
        }

        .hud-value.c-good {
            color: var(--green);
        }

        .hud-value.c-warn {
            color: var(--yellow);
        }

        .hud-value.c-danger {
            color: var(--red);
        }

        /* --- LEGEND --- */
        #legend {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 12px;
            z-index: 1000;
            font-size: 10px;
            color: var(--text);
            backdrop-filter: blur(8px);
            line-height: 1.9;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .leg-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* --- DEPLOY PANEL --- */
        #deploy-panel {
            position: fixed;
            top: 56px;
            left: 14px;
            width: 230px;
            background: rgba(15, 17, 23, .97);
            border: 1px solid rgba(109, 133, 153, .7);
            border-radius: 10px;
            padding: 12px 14px;
            z-index: 1001;
            display: none;
            backdrop-filter: blur(10px);
            font-family: 'Share Tech Mono', monospace;
        }

        #deploy-panel h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(179, 202, 48, .9);
            margin-bottom: 10px;
        }

        .dp-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 10px;
            color: #aab4c4;
        }

        .dp-row input[type=range] {
            width: 90px;
        }

        .dp-val {
            min-width: 28px;
            text-align: right;
            color: #b3ca30;
            font-weight: 700;
        }

        .dp-sep {
            height: 1px;
            background: rgba(109, 133, 153, .35);
            margin: 8px 0;
        }

        .dp-btn {
            width: 100%;
            padding: 7px;
            border-radius: 6px;
            border: 1px solid rgba(109, 133, 153, .6);
            background: rgba(255, 255, 255, .06);
            color: #cdd6f4;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
            transition: .2s;
        }

        .dp-btn:hover {
            background: rgba(255, 255, 255, .13);
        }

        .dp-btn.green {
            border-color: #19a725;
            color: #19a725;
        }

        .dp-btn.green:hover {
            background: rgba(25, 167, 37, .15);
        }

        /* --- PATH LINE --- */
        @keyframes dash {
            to {
                stroke-dashoffset: -12;
            }
        }

        /* --- MISSION END BANNER --- */
        #end-banner {
            display: none;
            position: fixed;
            top: 64px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 900;
            text-align: center;
            border: 2px solid;
            z-index: 2000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .7;
            }
        }

        #end-banner.success {
            background: rgba(34, 197, 94, .2);
            color: var(--green);
            border-color: var(--green);
        }

        #end-banner.partial {
            background: rgba(245, 158, 11, .2);
            color: var(--yellow);
            border-color: var(--yellow);
        }

        #end-banner.failed {
            background: rgba(239, 68, 68, .2);
            color: var(--red);
            border-color: var(--red);
        }

        /* --- FOLLOW TOGGLE --- */
        #follow-toggle {
            position: fixed;
            top: 56px;
            right: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 11px;
            z-index: 1000;
            font-size: 11px;
            color: var(--text);
            cursor: pointer;
            backdrop-filter: blur(8px);
            user-select: none;
        }

        #follow-toggle.on {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div id="topbar">
        <h1>SAR Live Mission</h1>
        <div id="status-pill">STANDBY</div>
        <span id="topbar-elapsed"
            style="font-size:16px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;">00:00</span>
        <div class="top-sep"></div>
        <span id="speed-label">Speed:</span>
        <button class="speed-btn" data-mult="0.5" onclick="setSpeed(0.5)">0.5×</button>
        <button class="speed-btn active" data-mult="1" onclick="setSpeed(1)">1×</button>
        <button class="speed-btn" data-mult="2" onclick="setSpeed(2)">2×</button>
        <button class="speed-btn" data-mult="4" onclick="setSpeed(4)">4×</button>
        <button class="speed-btn" data-mult="8" onclick="setSpeed(8)">8×</button>
        <button class="speed-btn" data-mult="16" onclick="setSpeed(16)">16×</button>
        <button class="speed-btn" data-mult="32" onclick="setSpeed(32)">32×</button>
        <button class="speed-btn" data-mult="100" onclick="setSpeed(100)">100×</button>
        <div class="top-sep"></div>
        <button class="top-btn" onclick="toggleDeployPanel()" id="btn-new-mission">⊕ New Mission</button>
        <a class="top-btn" href="index.html">← Control</a>
        <a class="top-btn" href="stats.html" target="_blank">Analytics</a>
    </div>

    <!-- Embedded deploy panel -->
    <div id="deploy-panel">
        <h3>New Mission Setup</h3>
        <div class="dp-row"><span>Agents</span><input id="dp-agents" type="range" min="1" max="4" value="1"
                oninput="dpV('dp-agents','dp-v-agents')"><span class="dp-val" id="dp-v-agents">1</span></div>
        <div class="dp-row"><span>Targets</span><input id="dp-targets" type="range" min="2" max="15" value="5"
                oninput="dpV('dp-targets','dp-v-targets')"><span class="dp-val" id="dp-v-targets">5</span></div>
        <div class="dp-row"><span>Patrol</span><input id="dp-patrol" type="range" min="0" max="8" value="3"
                oninput="dpV('dp-patrol','dp-v-patrol')"><span class="dp-val" id="dp-v-patrol">3</span></div>
        <div class="dp-row"><span>Aggressive</span><input id="dp-aggr" type="range" min="0" max="8" value="2"
                oninput="dpV('dp-aggr','dp-v-aggr')"><span class="dp-val" id="dp-v-aggr">2</span></div>
        <div class="dp-row"><span>Patrol spd</span><input id="dp-pspd" type="range" min="1" max="8" value="2.5"
                step="0.5" oninput="dpV('dp-pspd','dp-v-pspd')"><span class="dp-val" id="dp-v-pspd">2.5</span></div>
        <div class="dp-row"><span>Aggr spd</span><input id="dp-aspd" type="range" min="1" max="10" value="4.5"
                step="0.5" oninput="dpV('dp-aspd','dp-v-aspd')"><span class="dp-val" id="dp-v-aspd">4.5</span></div>
        <div class="dp-row"><span>Agent spd</span><input id="dp-rspd" type="range" min="2" max="14" value="6" step="0.5"
                oninput="dpV('dp-rspd','dp-v-rspd')"><span class="dp-val" id="dp-v-rspd">6</span></div>
        <div class="dp-row"><span>Detect R</span><input id="dp-drad" type="range" min="20" max="150" value="50"
                oninput="dpV('dp-drad','dp-v-drad')"><span class="dp-val" id="dp-v-drad">50</span></div>
        <div class="dp-sep"></div>
        <button class="dp-btn green" onclick="deployNewMission()">▶ Deploy New Mission</button>
        <button class="dp-btn" onclick="document.getElementById('deploy-panel').style.display='none'">✕ Close</button>
    </div>

    <!-- Mission control panel -->
    <div id="mission-ctrl">
        <div class="ctrl-label">Mission Control</div>
        <div class="ctrl-row">
            <button class="mc-btn btn-start" id="mc-start" onclick="mcStart()">Start</button>
            <button class="mc-btn btn-pause" id="mc-pause" onclick="mcPause()" disabled>Pause</button>
        </div>
        <div class="ctrl-row">
            <button class="mc-btn btn-stop" id="mc-stop" onclick="mcStop()" disabled>Stop</button>
            <button class="mc-btn btn-restart" id="mc-restart" onclick="mcRestart()" disabled>Restart</button>
        </div>
    </div>

    <div id="end-banner"></div>
    <div id="follow-toggle" class="on" onclick="toggleFollow()">Follow ON</div>

    <div id="hud">
        <div class="hud-card">
            <div class="hud-label">Targets</div>
            <div class="hud-value c-warn" id="hud-targets">-</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">Enemies</div>
            <div class="hud-value c-danger" id="hud-enemies">-</div>
        </div>
    </div>

    <div id="legend">
        <div><span class="leg-dot" style="background:#3d78ff"></span>Agent 1</div>
        <div><span class="leg-dot" style="background:#22c55e"></span>Agent 2</div>
        <div><span class="leg-dot" style="background:#f97316"></span>Agent 3</div>
        <div><span class="leg-dot" style="background:#e879f9"></span>Agent 4</div>
        <div><span class="leg-dot" style="background:gold"></span>Target</div>
        <div><span class="leg-dot" style="background:#ef4444"></span>Aggressive</div>
        <div><span class="leg-dot" style="background:#a855f7"></span>Patrol</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // --- Map ---
        const map = L.map('map', { zoomControl: false }).setView([38.900, 22.433], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, className: 'map-tiles' }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Dark map skin
        const ds = document.createElement('style');
        ds.textContent = '.map-tiles { filter: brightness(0.5) invert(1) contrast(1.1) hue-rotate(190deg) saturate(0.7); }';
        document.head.appendChild(ds);

        // --- State ---
        let followRobot = true;
        let missionDone = false;
        let agentMarkers = {};
        let agentPaths = {};
        let enemyMarkers = {};
        let enemyRings = {};
        let targetMarkers = {};
        let lastAgentCount = 0;

        // Mission control state
        let mcState = 'idle'; // idle | running | paused | stopped | game_over

        function toggleFollow() {
            followRobot = !followRobot;
            let btn = document.getElementById('follow-toggle');
            btn.className = followRobot ? 'on' : '';
            btn.textContent = followRobot ? 'Follow ON' : 'Follow OFF';
        }

        function fmtTime(sec) {
            let m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // Agent icons (per agent colour)
        const AGENT_COLORS = ['#3d78ff', '#22c55e', '#f97316', '#e879f9'];
        function agentIcon(color) {
            return L.divIcon({
                className: '',
                html: `<div style="width:14px;height:14px;background:${color};border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px ${color},0 0 16px ${color}66;"></div>`,
                iconSize: [14, 14], iconAnchor: [7, 7]
            });
        }

        // ── Mission Control Buttons ──
        function setMCButtons(state) {
            mcState = state;
            const s  = document.getElementById('mc-start');
            const p  = document.getElementById('mc-pause');
            const st = document.getElementById('mc-stop');
            const r  = document.getElementById('mc-restart');
            if (!s) return; // guard if panel not yet in DOM
            s.disabled = true; p.disabled = true; st.disabled = true; r.disabled = true;
            s.textContent = 'Start';
            if (state === 'idle')       { s.disabled = false; }
            else if (state === 'running')   { p.disabled = false; st.disabled = false; }
            else if (state === 'paused')    { s.disabled = false; s.textContent = '▶ Resume'; st.disabled = false; }
            else if (state === 'stopped' || state === 'game_over') { r.disabled = false; }
        }

        async function mcStart() {
            try {
                const res = await fetch('http://127.0.0.1:8000/api/sim/start', { method: 'POST' });
                const d   = await res.json();
                if (d.status === 'running')   { setMCButtons('running'); missionDone = false; document.getElementById('end-banner').style.display = 'none'; }
                else if (d.status === 'game_over') setMCButtons('game_over');
            } catch (e) { }
        }

        async function mcPause() {
            try {
                const d = await (await fetch('http://127.0.0.1:8000/api/sim/pause', { method: 'POST' })).json();
                setMCButtons(d.status === 'paused' ? 'paused' : 'running');
            } catch (e) { }
        }

        async function mcStop() {
            try { await fetch('http://127.0.0.1:8000/api/sim/stop', { method: 'POST' }); setMCButtons('stopped'); }
            catch (e) { }
        }

        // ── Deploy utils ──
        function dpV(sliderId, valId) {
            document.getElementById(valId).textContent = document.getElementById(sliderId).value;
        }

        function toggleDeployPanel() {
            const p = document.getElementById('deploy-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        // Populate deploy panel defaults from /api/map/info
        async function loadMapInfo() {
            try {
                const d = await (await fetch('http://127.0.0.1:8000/api/map/info')).json();
                if (d.has_map) {
                    currentMapLat = d.lat; currentMapLon = d.lon;
                    currentMapRadius = d.radius;
                    const set = (id, vid, v) => { if (v != null) { document.getElementById(id).value = v; document.getElementById(vid).textContent = v; } };
                    set('dp-agents', 'dp-v-agents', d.n_agents);
                    set('dp-targets', 'dp-v-targets', d.n_targets);
                    set('dp-patrol', 'dp-v-patrol', d.n_patrol);
                    set('dp-aggr', 'dp-v-aggr', d.n_aggr);
                    set('dp-pspd', 'dp-v-pspd', d.patrol_speed);
                    set('dp-aspd', 'dp-v-aspd', d.aggr_speed);
                    set('dp-rspd', 'dp-v-rspd', d.agent_speed);
                    set('dp-drad', 'dp-v-drad', d.detection_radius);
                    // Sync Mission Control button state
                    if (d.sim_running && !d.sim_paused) setMCButtons('running');
                    else if (d.sim_paused) setMCButtons('paused');
                    else if (d.game_over) setMCButtons('game_over');
                    else setMCButtons('idle');
                }
            } catch (e) { }
        }

        let currentMapLat = 38.900;
        let currentMapLon = 22.433;
        let currentMapRadius = 1500;

        async function deployNewMission() {
            if (!confirm('Deploy a new mission? The current mission will be cleared.')) return;
            document.getElementById('deploy-panel').style.display = 'none';
            const params = {
                lat: currentMapLat, lon: currentMapLon,
                radius: currentMapRadius,
                n_agents: parseInt(document.getElementById('dp-agents').value),
                n_targets: parseInt(document.getElementById('dp-targets').value),
                n_patrol: parseInt(document.getElementById('dp-patrol').value),
                n_aggr: parseInt(document.getElementById('dp-aggr').value),
                patrol_speed: parseFloat(document.getElementById('dp-pspd').value),
                aggr_speed: parseFloat(document.getElementById('dp-aspd').value),
                agent_speed: parseFloat(document.getElementById('dp-rspd').value),
                detection_radius: parseFloat(document.getElementById('dp-drad').value),
            };
            // Clear markers
            for (const id in agentMarkers) map.removeLayer(agentMarkers[id]);
            for (const id in agentPaths) map.removeLayer(agentPaths[id]);
            for (const id in enemyMarkers) map.removeLayer(enemyMarkers[id]);
            for (const id in enemyRings) map.removeLayer(enemyRings[id]);
            for (const id in targetMarkers) map.removeLayer(targetMarkers[id]);
            agentMarkers = {}; agentPaths = {}; enemyMarkers = {}; enemyRings = {}; targetMarkers = {};
            lastAgentCount = 0;
            missionDone = false;
            document.getElementById('end-banner').style.display = 'none';
            document.getElementById('status-pill').textContent = 'Loading...';
            const url = `http://127.0.0.1:8000/api/map/vector?lat=${params.lat}&lon=${params.lon}&radius=${params.radius}` +
                `&n_agents=${params.n_agents}&n_targets=${params.n_targets}` +
                `&n_patrol=${params.n_patrol}&n_aggr=${params.n_aggr}` +
                `&patrol_speed=${params.patrol_speed}&aggr_speed=${params.aggr_speed}` +
                `&agent_speed=${params.agent_speed}&detection_radius=${params.detection_radius}&mode=random`;
            try {
                await fetch(url);
                document.getElementById('hud').innerHTML = hudBaseHTML();
                setMCButtons('idle');
                document.getElementById('status-pill').textContent = 'READY';
                map.panTo([params.lat, params.lon]);
            } catch (e) {
                document.getElementById('status-pill').textContent = 'DEPLOY ERROR';
            }
        }

        async function mcRestart() {
            try {
                await fetch('http://127.0.0.1:8000/api/sim/restart', { method: 'POST' });
                missionDone = false;
                document.getElementById('end-banner').style.display = 'none';
                document.getElementById('status-pill').className = '';
                document.getElementById('status-pill').textContent = 'READY';
                document.getElementById('topbar-elapsed').textContent = '00:00';
                // Clear map markers
                for (const id in agentMarkers) { map.removeLayer(agentMarkers[id]); }
                for (const id in agentPaths) { map.removeLayer(agentPaths[id]); }
                for (const id in enemyMarkers) { map.removeLayer(enemyMarkers[id]); }
                for (const id in enemyRings) { map.removeLayer(enemyRings[id]); }
                for (const id in targetMarkers) { map.removeLayer(targetMarkers[id]); }
                agentMarkers = {}; agentPaths = {};
                enemyMarkers = {}; enemyRings = {}; targetMarkers = {};
                lastAgentCount = 0;
                document.getElementById('hud').innerHTML = hudBaseHTML();
                setMCButtons('idle');
            } catch (e) { }
        }

        // ── Speed ──
        async function setSpeed(mult) {
            try {
                await fetch('http://127.0.0.1:8000/api/sim/speed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ multiplier: mult })
                });
            } catch (e) { }
            document.querySelectorAll('.speed-btn').forEach(b =>
                b.classList.toggle('active', parseFloat(b.dataset.mult) === mult));
        }

        // ── HUD helpers ──
        function hudBaseHTML() {
            return `
                <div class="hud-card">
                    <div class="hud-label">Targets</div>
                    <div class="hud-value c-warn" id="hud-targets">-</div>
                </div>
                <div class="hud-card">
                    <div class="hud-label">Enemies</div>
                    <div class="hud-value c-danger" id="hud-enemies">-</div>
                </div>`;
        }

        function updateAgentHud(agents) {
            if (agents.length !== lastAgentCount) {
                lastAgentCount = agents.length;
                let html = '';
                agents.forEach((ag, i) => {
                    const c = ag.color || AGENT_COLORS[i % 4];
                    html += `<div class="hud-card" style="border-color:${c}33">
                        <div class="hud-label" style="color:${c}">Agent ${ag.id}</div>
                        <div class="hud-value" id="hud-agent-${ag.id}" style="color:${c}">0</div>
                    </div>`;
                });
                html += hudBaseHTML();
                document.getElementById('hud').innerHTML = html;
            }
            agents.forEach(ag => {
                const el = document.getElementById(`hud-agent-${ag.id}`);
                if (el) el.textContent = ag.score;
            });
        }

        // ── End Banner ──
        function showEndBanner(status, score) {
            const b = document.getElementById('end-banner');
            if (!b || missionDone) return;
            missionDone = true;
            if (status?.includes('PARTIAL')) {
                b.className = 'partial'; b.textContent = `PARTIAL SUCCESS  |  Score: ${score}`;
            } else if (status?.includes('SUCCESS')) {
                b.className = 'success'; b.textContent = `MISSION SUCCESS  |  Score: ${score}`;
            } else {
                b.className = 'failed'; b.textContent = `MISSION FAILED  |  Score: ${score}`;
            }
            b.style.display = 'block';
            setMCButtons('game_over');
        }

        // ── Main polling loop ──
        async function poll() {
            try {
                const data = await (await fetch('http://127.0.0.1:8000/api/robot/position')).json();

                // Multi-agent rendering
                const agents = data.agents || [];
                if (agents.length > 0) updateAgentHud(agents);

                const seenAgentIds = new Set();
                agents.forEach(ag => {
                    if (!ag.lat || !ag.lon) return;
                    seenAgentIds.add(ag.id);
                    const color = ag.color || AGENT_COLORS[ag.id % 4];
                    const pos = [ag.lat, ag.lon];

                    if (!agentMarkers[ag.id]) {
                        agentMarkers[ag.id] = L.marker(pos, { icon: agentIcon(color), zIndexOffset: 1000 })
                            .addTo(map).bindPopup(`Agent #${ag.id}`);
                        if (ag.id === 0) map.setView(pos, 17);
                    } else {
                        agentMarkers[ag.id].setLatLng(pos);
                    }
                    if (ag.id === 0 && followRobot) map.panTo(pos, { animate: true, duration: 0.5 });

                    // Per-agent path
                    if (ag.auto_path && ag.auto_path.length > 1) {
                        if (agentPaths[ag.id]) map.removeLayer(agentPaths[ag.id]);
                        agentPaths[ag.id] = L.polyline(ag.auto_path, {
                            color, weight: 3, opacity: 0.85, dashArray: '8 4'
                        }).addTo(map);
                    } else if (!ag.auto_path || ag.auto_path.length === 0) {
                        if (agentPaths[ag.id]) { map.removeLayer(agentPaths[ag.id]); delete agentPaths[ag.id]; }
                    }
                });
                // Remove stale agent markers
                for (const id in agentMarkers) {
                    if (!seenAgentIds.has(parseInt(id))) {
                        map.removeLayer(agentMarkers[id]); delete agentMarkers[id];
                        if (agentPaths[id]) { map.removeLayer(agentPaths[id]); delete agentPaths[id]; }
                    }
                }

                // Status pill + HUD (use first agent for mode display if available)
                if (data.score !== undefined) {
                    const pill = document.getElementById('status-pill');
                    pill.className = '';
                    if (data.game_over) {
                        if (data.status?.includes('PARTIAL')) { pill.textContent = 'PARTIAL'; pill.classList.add('partial'); }
                        else if (data.status?.includes('SUCCESS')) { pill.textContent = 'SUCCESS'; pill.classList.add('success'); }
                        else { pill.textContent = 'FAILED'; pill.classList.add('danger'); }
                        if (!missionDone) showEndBanner(data.status, data.score);
                    } else if (data.escape_mode) {
                        pill.textContent = 'EVADING'; pill.classList.add('warn');
                    } else if (agents.length > 0 && agents[0].lat) {
                        pill.textContent = 'ACTIVE'; pill.classList.add('safe');
                    } else {
                        pill.textContent = 'STANDBY';
                    }
                }

                // Enemies
                if (data.enemies) {
                    const hudEn = document.getElementById('hud-enemies');
                    if (hudEn) hudEn.textContent = data.enemies.length;
                    const seenIds = new Set();
                    data.enemies.forEach(e => {
                        seenIds.add(e.id);
                        const color = e.type === 'aggressive' ? '#ef4444' : '#a855f7';
                        const pos = [e.lat, e.lon];
                        if (!enemyMarkers[e.id]) {
                            enemyMarkers[e.id] = L.circleMarker(pos, { color, fillColor: color, fillOpacity: 0.9, radius: e.type === 'aggressive' ? 7 : 5, weight: 2 })
                                .addTo(map).bindPopup(`Enemy #${e.id} (${e.type})`);
                            enemyRings[e.id] = L.circle(pos, { radius: e.detection_radius_m || 50, color, fillColor: color, fillOpacity: 0.04, weight: 1, dashArray: '5 3' }).addTo(map);
                        } else {
                            enemyMarkers[e.id].setLatLng(pos).setStyle({ color, fillColor: color });
                            enemyRings[e.id].setLatLng(pos);
                        }
                    });
                    for (const id in enemyMarkers) if (!seenIds.has(parseInt(id))) {
                        map.removeLayer(enemyMarkers[id]); delete enemyMarkers[id];
                        if (enemyRings[id]) { map.removeLayer(enemyRings[id]); delete enemyRings[id]; }
                    }
                }

                // Targets
                if (data.targets) {
                    const hudTg = document.getElementById('hud-targets');
                    if (hudTg) hudTg.textContent = data.targets.length;
                    const seenTids = new Set(data.targets.map(t => t.id));
                    data.targets.forEach(t => {
                        if (!targetMarkers[t.id])
                            targetMarkers[t.id] = L.circleMarker([t.lat, t.lon], { color: 'gold', fillColor: 'gold', fillOpacity: 0.9, radius: 8, weight: 2 })
                                .addTo(map).bindPopup(`Target #${t.id}`);
                    });
                    for (const id in targetMarkers) if (!seenTids.has(parseInt(id))) {
                        map.removeLayer(targetMarkers[id]); delete targetMarkers[id];
                    }
                }
            } catch (e) { }
        }

        // ── Elapsed + sim state sync ──
        async function pollStats() {
            try {
                const d = await (await fetch('http://127.0.0.1:8000/api/stats')).json();
                if (d.elapsed !== undefined)
                    document.getElementById('topbar-elapsed').textContent = fmtTime(d.elapsed);
            } catch (e) { }
        }

        // Sync mission control button state from server on load
        async function syncState() {
            try {
                const d = await (await fetch('http://127.0.0.1:8000/api/sim/state')).json();
                if (!d.map_loaded) { setMCButtons('idle'); return; }
                if (d.game_over) setMCButtons('game_over');
                else if (d.paused) setMCButtons('paused');
                else if (d.running) setMCButtons('running');
                else setMCButtons('idle');
            } catch (e) { }
        }

        setMCButtons('idle');
        loadMapInfo();   // populate deploy panel + sync button state from server
        poll();
        setInterval(poll, 200);
        setInterval(pollStats, 1000);
    </script>
</body>

</html>
